services:
  app:
    build: .
    ports: 
    - "8080:8080"
    environment:
    - DB_HOST=db
    - DB_USER=postgres
    - DB_PASSWORD=postgres
    - DB_NAME=bookie
    - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: .
    networks:
      - go-network
  db:
    image: postgres:latest
    container_name: bookie_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - go-network


volumes: 
  pgdata:

networks:
  go-network:
    driver: bridge
